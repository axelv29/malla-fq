<style>
:root {
  --card-w:88px;--card-h:96px;
  --bg:#0F172A;--surface:#1E293B;--surface2:#334155;
  --text:#F1F5F9;--text2:#94A3B8;--text3:#64748B;
  --radius:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--surface2);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}
.header-title h1{font-size:1.1rem;font-weight:700;letter-spacing:.5px}
.header-title p{font-size:.75rem;color:var(--text2);margin-top:2px}
.creditos-global{display:flex;align-items:center;gap:10px}
.creditos-global .total{font-size:1.5rem;font-weight:800}
.creditos-global .meta{font-size:.7rem;color:var(--text2)}
.progress-bar-wrap{width:140px;height:6px;background:var(--surface2);border-radius:9999px;overflow:hidden}
.progress-bar-fill{height:100%;background:#22D3EE;border-radius:9999px;transition:width .4s}
.areas-legend{display:flex;gap:6px;flex-wrap:wrap;padding:8px 24px;background:var(--surface);border-bottom:1px solid var(--surface2)}
.area-badge{display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:9999px;font-size:.68rem;font-weight:600;border:1px solid transparent}
.area-badge .dot{width:8px;height:8px;border-radius:50%}
.area-progress-section{padding:12px 24px;display:flex;gap:10px;flex-wrap:wrap}
.area-prog-item{flex:1 1 150px;background:var(--surface);border:1px solid var(--surface2);border-radius:8px;padding:10px 12px}
.area-prog-label{font-size:.65rem;font-weight:700;margin-bottom:6px;display:flex;justify-content:space-between}
.area-prog-bar{height:5px;background:var(--surface2);border-radius:9999px;overflow:hidden}
.area-prog-fill{height:100%;border-radius:9999px;transition:width .4s}
main{padding:20px;overflow-x:auto}
.semestres-wrap{display:flex;gap:12px;min-width:max-content}
.semestre-col{display:flex;flex-direction:column;gap:6px;width:var(--card-w)}
.semestre-label{text-align:center;font-size:.62rem;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding-bottom:4px;border-bottom:1px solid var(--surface2);margin-bottom:2px}
.materia-card{width:var(--card-w);min-height:var(--card-h);border-radius:var(--radius);border:1.5px solid;padding:5px 4px 4px;cursor:pointer;position:relative;transition:transform .15s,box-shadow .15s,opacity .2s;display:flex;flex-direction:column;user-select:none}
.materia-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.4);z-index:10}
.materia-card.pendiente{opacity:.5}
.materia-card.aprobada{opacity:.85}
.materia-card.exonerada{opacity:1}
.card-numero{font-size:.6rem;font-weight:700;text-align:right;line-height:1;opacity:.7}
.card-simbolo{font-size:.9rem;font-weight:800;text-align:center;margin:3px 0;line-height:1.1}
.card-nombre{font-size:.5rem;text-align:center;line-height:1.2;margin-top:auto;opacity:.85}
.card-estado{position:absolute;top:3px;left:3px;width:10px;height:10px;border-radius:50%}
.estado-exonerada{background:#4ADE80;box-shadow:0 0 5px #4ADE80}
.estado-aprobada{background:#FACC15;box-shadow:0 0 5px #FACC15}
.estado-pendiente{display:none}
.hemi-tag{position:absolute;bottom:3px;right:3px;font-size:.45rem;background:rgba(255,255,255,.12);border-radius:3px;padding:1px 3px;line-height:1}
.area-CFM{background:#172554;border-color:#1D4ED8;color:#BAE6FD}
.area-CQ{background:#14532D;border-color:#15803D;color:#BBF7D0}
.area-CBB{background:#431407;border-color:#C2410C;color:#FED7AA}
.area-CFA{background:#3B0764;border-color:#7E22CE;color:#E9D5FF}
.area-PRO{background:#111827;border-color:#6B7280;color:#D1D5DB}
.materia-card.highlight-pre{outline:2px solid #FACC15;outline-offset:2px;opacity:1!important}
.materia-card.highlight-post{outline:2px solid #4ADE80;outline-offset:2px;opacity:1!important}
.materia-card.highlight-self{outline:2px solid #38BDF8;outline-offset:2px;opacity:1!important}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--surface2);border-radius:12px;width:min(480px,92vw);max-height:82vh;overflow-y:auto;padding:24px}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:12px}
.modal-titulo{font-size:1rem;font-weight:700}
.modal-codigo{font-size:.72rem;color:var(--text2);margin-top:3px}
.modal-close{background:none;border:none;color:var(--text2);font-size:1.2rem;cursor:pointer;padding:2px 6px;border-radius:4px}
.modal-close:hover{background:var(--surface2)}
.modal-info{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.info-item label{display:block;font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.info-item span{font-size:.85rem;font-weight:600}
.previas-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.previas-titulo{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;font-weight:700}
.previa-tag{font-size:.72rem;padding:3px 8px;border-radius:9999px;border:1px solid;cursor:pointer;transition:opacity .15s}
.previa-tag:hover{opacity:.8}
.modal-estado-btns{display:flex;gap:8px;margin-top:14px}
.btn-estado{flex:1;padding:8px;border-radius:8px;border:1.5px solid;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;background:transparent}
.btn-pendiente{border-color:var(--text3);color:var(--text3)}
.btn-aprobada{border-color:#FACC15;color:#FACC15}
.btn-exonerada{border-color:#4ADE80;color:#4ADE80}
.btn-estado.activo.btn-pendiente{background:var(--text3);color:#000}
.btn-estado.activo.btn-aprobada{background:#FACC15;color:#000}
.btn-estado.activo.btn-exonerada{background:#4ADE80;color:#000}
.modal-notas{margin-top:12px;font-size:.75rem;color:var(--text2);background:var(--surface2);border-radius:6px;padding:8px 10px;line-height:1.5}
.highlight-legend{padding:6px 24px;display:flex;gap:16px;font-size:.68rem;color:var(--text3);background:var(--bg)}
.highlight-legend span{display:flex;align-items:center;gap:5px}
</style>
</head>

const idx=Object.fromEntries(materias.map(m=>[m.id,m]));
const STORAGE_KEY="qf_malla_pe2015_v1";
function cargarEstado(){try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):{}}catch{return{}}}
function guardarEstado(e){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(e))}catch{}}
let estado=cargarEstado();
function getEstado(id){return estado[id]||"pendiente"}
function setEstado(id,val){estado[id]=val;guardarEstado(estado);renderMalla();actualizarCreditos();if(modalId===id)abrirModal(id)}

function calcCreditos(){
  const t={total:0};
  for(const a in areasMeta)t[a]=0;
  for(const m of materias)if(getEstado(m.id)==="exonerada"){t[m.area]=(t[m.area]||0)+m.creditos;t.total+=m.creditos}
  return t;
}

function actualizarCreditos(){
  const cr=calcCreditos();
  document.getElementById("cr-total").textContent=cr.total;
  const pct=Math.min(100,Math.round(cr.total/CREDITOS_MIN*100));
  document.getElementById("progress-global").style.width=pct+"%";
  document.getElementById("pct-global").textContent=pct;
  for(const[k,a]of Object.entries(areasMeta)){
    const f=document.getElementById("fill-"+k);
    const l=document.getElementById("label-cr-"+k);
    if(!f)continue;
    const got=cr[k]||0;
    const pa=Math.min(100,Math.round(got/a.creditosMin*100));
    f.style.width=pa+"%";f.style.background=a.color;
    if(l)l.textContent=got+" / "+a.creditosMin+" cr";
  }
}

function renderLeyenda(){
  const c=document.getElementById("areas-legend");c.innerHTML="";
  for(const[k,a]of Object.entries(areasMeta)){
    const b=document.createElement("div");b.className="area-badge";
    b.style.cssText=`background:${a.color}18;border-color:${a.color}55;color:${a.color}`;
    b.innerHTML=`<span class="dot" style="background:${a.color}"></span>${a.nombre} <span style="opacity:.7;font-size:.62rem">(mín. ${a.creditosMin} cr)</span>`;
    c.appendChild(b);
  }
}

function renderAreaProgress(){
  const c=document.getElementById("area-progress");c.innerHTML="";
  for(const[k,a]of Object.entries(areasMeta)){
    const d=document.createElement("div");d.className="area-prog-item";
    d.innerHTML=`<div class="area-prog-label"><span style="color:${a.color}">${a.nombre}</span><span id="label-cr-${k}" style="color:var(--text2)">0 / ${a.creditosMin} cr</span></div><div class="area-prog-bar"><div class="area-prog-fill" id="fill-${k}" style="width:0%;background:${a.color}"></div></div>`;
    c.appendChild(d);
  }
}

function simbolo(m){
  const p=m.nombreCorto.replace(/[().]/g,"").trim().split(/\s+/);
  if(p.length>=2)return(p[0][0]+p[1][0]).toUpperCase();
  return m.nombreCorto.slice(0,2).toUpperCase();
}

function renderMalla(){
  const wrap=document.getElementById("malla");wrap.innerHTML="";
  const sems=[...new Set(materias.map(m=>m.semestre))].sort((a,b)=>a-b);
  for(const s of sems){
    const col=document.createElement("div");col.className="semestre-col";
    const lbl=document.createElement("div");lbl.className="semestre-label";
    lbl.textContent="Sem. "+s;col.appendChild(lbl);
    for(const m of materias.filter(x=>x.semestre===s)){
      const est=getEstado(m.id);
      const card=document.createElement("div");
      card.className=`materia-card area-${m.area} ${est}`;
      card.dataset.id=m.id;
      card.innerHTML=`
        <span class="card-estado estado-${est}"></span>
        <div class="card-numero">${m.creditos} cr</div>
        <div class="card-simbolo">${simbolo(m)}</div>
        <div class="card-nombre">${m.nombreCorto}</div>
        ${m.hemisemestre?`<span class="hemi-tag">${m.hemisemestre}° hemi</span>`:""}
      `;
      card.addEventListener("click",()=>abrirModal(m.id));
      card.addEventListener("mouseenter",()=>highlightPrevias(m.id));
      card.addEventListener("mouseleave",clearHighlight);
      col.appendChild(card);
    }
    wrap.appendChild(col);
  }
}

function highlightPrevias(id){
  clearHighlight();
  const el=document.querySelector(`[data-id="${id}"]`);
  if(el)el.classList.add("highlight-self");
  const m=idx[id];if(!m)return;
  for(const pid of m.pre){const e=document.querySelector(`[data-id="${pid}"]`);if(e)e.classList.add("highlight-pre")}
  for(const om of materias)if(om.pre.includes(id)){const e=document.querySelector(`[data-id="${om.id}"]`);if(e)e.classList.add("highlight-post")}
}
function clearHighlight(){document.querySelectorAll(".highlight-pre,.highlight-post,.highlight-self").forEach(e=>e.classList.remove("highlight-pre","highlight-post","highlight-self"))}

let modalId=null;
function abrirModal(id){
  modalId=id;
  const m=idx[id];const est=getEstado(id);
  document.getElementById("modal-titulo").textContent=m.nombre;
  document.getElementById("modal-codigo").textContent=`Código: ${m.codigo} · Semestre ${m.semestre}${m.hemisemestre?" ("+m.hemisemestre+"° hemi)":""} · ${areasMeta[m.area].nombre}`;
  document.getElementById("modal-info").innerHTML=`
    <div class="info-item"><label>Créditos</label><span>${m.creditos}</span></div>
    <div class="info-item"><label>Área</label><span style="color:${areasMeta[m.area].color}">${m.area}</span></div>
    <div class="info-item"><label>Semestre</label><span>${m.semestre}</span></div>
    <div class="info-item"><label>Estado</label><span>${est.charAt(0).toUpperCase()+est.slice(1)}</span></div>
  `;
  const pd=document.getElementById("modal-previas");
  if(m.pre.length){
    pd.innerHTML=`<div class="previas-titulo">Previas requeridas</div><div class="previas-list">${
      m.pre.map(pid=>{const pm=idx[pid];const ok=getEstado(pid)==="exonerada";
        return`<span class="previa-tag" style="border-color:${ok?"#4ADE80":"#F87171"};color:${ok?"#4ADE80":"#F87171"}" onclick="cerrarModal();setTimeout(()=>abrirModal('${pid}'),50)">${pm?pm.nombreCorto:pid} ${ok?"✓":"✗"}</span>`
      }).join("")
    }</div>`;
  } else {
    pd.innerHTML=`<p style="font-size:.75rem;color:var(--text3);margin-bottom:12px">Sin previas requeridas.</p>`;
  }
  document.querySelectorAll(".btn-estado").forEach(b=>b.classList.toggle("activo",b.dataset.estado===est));
  const ne=document.getElementById("modal-notas");
  if(m.notas){ne.textContent="ℹ️ "+m.notas;ne.style.display="block"}else{ne.style.display="none"}
  document.getElementById("modal-overlay").classList.add("open");
}
function cerrarModal(){document.getElementById("modal-overlay").classList.remove("open");modalId=null;clearHighlight()}

document.getElementById("modal-close").addEventListener("click",cerrarModal);
document.getElementById("modal-overlay").addEventListener("click",e=>{if(e.target.id==="modal-overlay")cerrarModal()});
document.querySelectorAll(".btn-estado").forEach(b=>b.addEventListener("click",()=>{if(modalId)setEstado(modalId,b.dataset.estado)}));
document.addEventListener("keydown",e=>{if(e.key==="Escape")cerrarModal()});

renderLeyenda();renderAreaProgress();renderMalla();actualizarCreditos();
</script>
</body>
</html>
